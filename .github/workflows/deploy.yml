name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch SDE build number
        id: sde_version
        run: |
          BUILD=$(python -c "
          import urllib.request, json
          with urllib.request.urlopen('https://developers.eveonline.com/static-data/tranquility/latest.jsonl') as r:
              for line in r.read().decode().splitlines():
                  e = json.loads(line)
                  if e.get('_key') == 'sde':
                      print(e['buildNumber']); break
          ")
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Cache SDE data
        uses: actions/cache@v6
        with:
          path: public/data/
          key: sde-${{ steps.sde_version.outputs.build }}

      - name: Download SDE
        run: python scripts/download_sde.py

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_EVE_CLIENT_ID: ${{ secrets.VITE_EVE_CLIENT_ID }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
